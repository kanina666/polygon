name: C++ CI

on:
  push:
    branches:
      - J3113_Konkova_Nina
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install g++
      run: sudo apt-get install g++

    - name: Compile main.cpp and label_encoder.cpp
      run: g++ main.cpp label_encoder.cpp -o main 

    - name: Run main program
      run: ./main 

    - name: Compile tests.cpp and label_encoder.cpp
      run: g++ tests.cpp label_encoder.cpp -o tests 

    - name: Run tests
      run: ./tests
